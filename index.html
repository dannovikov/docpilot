<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>docpilot — Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #fafafa;
            color: #18181b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            max-width: 480px;
            padding: 2rem;
        }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8125rem;
            font-weight: 500;
            color: #8b5cf6;
            background: #ede9fe;
            border-radius: 999px;
            padding: 0.375rem 0.875rem;
            margin-bottom: 1.5rem;
        }
        .pulse {
            width: 8px;
            height: 8px;
            background: #8b5cf6;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 0.75rem;
            color: #09090b;
        }
        .description {
            font-size: 1rem;
            color: #71717a;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            font-size: 0.75rem;
            color: #a1a1aa;
            border: 1px solid #e4e4e7;
            border-radius: 999px;
            padding: 0.375rem 0.75rem;
        }
        .badge svg { width: 14px; height: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="status">
            <span class="pulse"></span>
            Being built by Bloom
        </div>
        <h1>docpilot</h1>
        <p class="description">A document copilot that helps you read documents</p>
        <a class="badge" href="https://bloomit.ai" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"/>
                <path d="M12 2a10 10 0 0 1 0 20 10 10 0 0 1 0-20"/>
                <path d="M2 12h4M18 12h4"/>
            </svg>
            Powered by Bloom
        </a>
    </div>
</body>
</html>
